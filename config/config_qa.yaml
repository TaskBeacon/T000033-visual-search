subinfo_fields:
  - name: subject_id
    type: int
    constraints:
      min: 101
      max: 999
      digits: 3
subinfo_mapping:
  subject_id: Subject ID (3 digits)
  Participant Information: Participant Information
  registration_failed: Registration failed
  registration_successful: Registration successful
  invalid_input: "{field} is invalid"
window:
  size: [1280, 720]
  units: pix
  screen: 0
  bg_color: gray
  fullscreen: false
  monitor_width_cm: 35.5
  monitor_distance_cm: 60
task:
  task_name: visual_search
  save_path: ./outputs/qa
  total_blocks: 1
  total_trials: 16
  trial_per_block: 16
  conditions:
    - feature_present
    - feature_absent
    - conjunction_present
    - conjunction_absent
  key_list:
    - f
    - j
    - space
  present_key: f
  absent_key: j
  seed_mode: same_across_sub
  language: English
  voice_name: en-US-AriaNeural
  voice_enabled: false
timing:
  fixation_duration: [0.3, 0.4]
  response_deadline: 1.2
  iti_duration: 0.2
  item_height: 42
  item_font: Arial
stimuli:
  instruction_text:
    type: text
    text: "Visual Search QA\n\nFind the red T.\nF = present, J = absent.\n\nPress SPACE to begin."
    color: white
    height: 28
    wrapWidth: 980
    pos: [0, 40]
  fixation:
    type: text
    text: "+"
    color: white
    height: 44
    pos: [0, 0]
  search_goal:
    type: text
    text: "Find red T"
    color: [0.92, 0.92, 0.92]
    height: 28
    wrapWidth: 900
    pos: [0, 305]
  array_boundary:
    type: circle
    radius: 285
    pos: [0, 0]
    lineColor: [0.45, 0.45, 0.45]
    lineWidth: 2
    fillColor: null
  block_break:
    type: text
    text: "Block {block_num}/{total_blocks} complete\n\nAccuracy: {block_accuracy:.1%}\nMean correct RT: {mean_rt_ms:.0f} ms\nTimeouts: {timeout_count}\n\nPress SPACE when ready."
    color: white
    height: 26
    wrapWidth: 980
  good_bye:
    type: text
    text: "QA complete.\n\nTrials: {total_trials}\nAccuracy: {total_accuracy:.1%}\nMean correct RT: {mean_rt_ms:.0f} ms\nTimeouts: {total_timeouts}\n\nPress SPACE to exit."
    color: white
    height: 28
    wrapWidth: 980
triggers:
  map:
    exp_onset: 1
    exp_end: 2
    block_onset: 10
    block_end: 11
    fixation_onset: 20
    search_onset: 30
    response_present: 31
    response_absent: 32
    search_timeout: 33
    iti_onset: 40
  driver:
    type: serial_url
    url: loop://
    baudrate: 115200
  timing:
    post_delay_ms: 1
  policy:
    strict: false
condition_generation:
  feature_set_sizes: [8, 12]
  conjunction_set_sizes: [8, 12]
  array_radius_px: 240
  array_radius_jitter_px: 20
  orientation_pool: [0, 90, 180, 270]
  target_glyph: T
  conjunction_alt_glyph: L
  target_color: red
  distractor_color: green
  random_seed: 17
  enable_logging: true
qa:
  output_dir: outputs/qa
  enable_scaling: true
  timing_scale: 0.1
  min_frames: 1
  strict: false
  max_wait_s: 10.0
  acceptance_criteria:
    required_columns:
      - condition
      - block_id
      - trial_index
      - search_type
      - target_present
      - set_size
      - search_array_response
      - search_array_rt
      - search_array_hit
    expected_trial_count: 16
    allowed_keys: [f, j, space]
    triggers_required: true


